  <line x1="150" y1="150" x2="250" y2="150" stroke="#FF3366" stroke-width="1.5" opacity="0.3"/>
  <text x="200" y="270" text-anchor="middle" font-family="Poppins, sans-serif" font-size="14" fill="#FF3366" opacity="0.6" font-weight="600">GUL CITY CENTER</text>
