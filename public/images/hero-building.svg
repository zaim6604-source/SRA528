<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <rect width="400" height="300" fill="#FFF0F5"/>
  <!-- Building -->
  <rect x="120" y="60" width="160" height="180" rx="4" fill="#FF3366" opacity="0.15"/>
  <rect x="130" y="70" width="50" height="40" rx="2" fill="#FF3366" opacity="0.3"/>
  <rect x="190" y="70" width="50" height="40" rx="2" fill="#FF3366" opacity="0.3"/>
  <rect x="250" y="70" width="20" height="40" rx="2" fill="#FF3366" opacity="0.3"/>
  <rect x="130" y="120" width="50" height="40" rx="2" fill="#FF3366" opacity="0.2"/>
  <rect x="190" y="120" width="50" height="40" rx="2" fill="#FF3366" opacity="0.2"/>
  <rect x="250" y="120" width="20" height="40" rx="2" fill="#FF3366" opacity="0.2"/>
  <rect x="130" y="170" width="50" height="40" rx="2" fill="#FF3366" opacity="0.15"/>
  <rect x="190" y="170" width="50" height="40" rx="2" fill="#FF3366" opacity="0.15"/>
  <rect x="250" y="170" width="20" height="40" rx="2" fill="#FF3366" opacity="0.15"/>
  <!-- Door -->
  <rect x="175" y="200" width="50" height="40" rx="20" fill="#FF3366" opacity="0.4"/>
